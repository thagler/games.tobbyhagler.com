name: Purge Cloudflare Cache

run-name: Purge Cloudflare cache

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      purge_everything:
        description: "Set to true to purge entire zone cache (debug/fallback)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: cloudflare-purge-main
  cancel-in-progress: true

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "Missing secret: CLOUDFLARE_ZONE_ID"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - name: Purge Cloudflare cache for games.tobbyhagler.com
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PURGE_EVERYTHING_INPUT: ${{ github.event.inputs.purge_everything || 'false' }}
        run: |
          set -euo pipefail

          payload='{"hosts":["games.tobbyhagler.com"]}'
          if [ "$PURGE_EVERYTHING_INPUT" = "true" ]; then
            payload='{"purge_everything":true}'
            echo "Using purge_everything mode"
          else
            echo "Using host purge mode for games.tobbyhagler.com"
          fi

          http_code=$(curl -sS -o /tmp/cloudflare_response.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")

          response="$(cat /tmp/cloudflare_response.json)"
          echo "$response"
          echo "Cloudflare HTTP status: $http_code"

          CLOUDFLARE_RESPONSE="$response" python3 - "$http_code" <<'PY'
          import json
          import os
          import sys

          http_code = int(sys.argv[1])
          raw = os.environ["CLOUDFLARE_RESPONSE"]

          try:
              result = json.loads(raw)
          except json.JSONDecodeError:
              raise SystemExit(f"Cloudflare returned non-JSON response (HTTP {http_code}): {raw[:500]}")

          if 200 <= http_code < 300 and result.get("success"):
              print("Cloudflare purge succeeded")
              raise SystemExit(0)

          errors = result.get("errors", [])
          if errors:
              details = "; ".join(
                  f"{e.get('code', 'unknown')}: {e.get('message', 'no message')}"
                  for e in errors
              )
          else:
              details = f"No Cloudflare error details were returned. HTTP {http_code}"

          raise SystemExit(f"Cloudflare purge failed: {details}")
          PY
