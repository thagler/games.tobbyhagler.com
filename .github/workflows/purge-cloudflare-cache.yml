name: Purge Cloudflare Cache

run-name: Purge Cloudflare cache

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      purge_everything:
        description: "Set to true to purge entire zone cache (debug/fallback)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: cloudflare-purge-main
  cancel-in-progress: true

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "Missing secret: CLOUDFLARE_ZONE_ID"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - name: Purge Cloudflare cache for games.tobbyhagler.com
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PURGE_EVERYTHING_INPUT: ${{ github.event.inputs.purge_everything || 'false' }}
        run: |
          set -euo pipefail

          payload='{"hosts":["games.tobbyhagler.com"]}'
          if [ "$PURGE_EVERYTHING_INPUT" = "true" ]; then
            payload='{"purge_everything":true}'
            echo "Using purge_everything mode"
          else
            echo "Using host purge mode for games.tobbyhagler.com"
          fi

          response=$(curl -sS --fail-with-body -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "$response"

          RESPONSE="$response" python3 -c 'import json, os, sys; result = json.loads(os.environ["RESPONSE"]); errors = result.get("errors", []); details = "; ".join(f"{e.get(\"code\", \"unknown\")}: {e.get(\"message\", \"no message\")}" for e in errors) if errors else "No Cloudflare error details were returned."; print("Cloudflare purge succeeded") if result.get("success") else sys.exit(f"Cloudflare purge failed: {details}")'
